# Fire Code of the Philippines (RA 9514)
# 2019 Revised Implementing Rules and Regulations (RIRR)
# Occupant Load Factors
#
# Source: RA 9514 RIRR 2019, Division 10.2.8
# Verified against: Studocu RA9514 RIRR reference, Scribd 608192234

code: "RA 9514"
section: "Division 10.2.8 — Occupant Load"
source: "2019 RIRR of RA 9514"
last_verified: "2026-06-27"

notes: |
  Occupant Load Factor (OLF) = floor area per person.
  To calculate occupant load: Total Floor Area / OLF = Number of Occupants.
  Use the most restrictive (smallest) OLF when multiple uses apply.

rules:

