  # ASSEMBLY OCCUPANCIES
  # ============================================================

  - id: "FC-OL001"
    section: "Div. 10.2.8"
    description: "Assembly — concentrated seating (without fixed seats)"
    value: 0.65
    unit: "sqm/person"
    applies_to: ["assembly"]
    conditions:
      seating: "concentrated"

  - id: "FC-OL002"
